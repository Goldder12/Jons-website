<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Statistics</title>
  <link rel="stylesheet" href="../css/student_rank.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24">
      <path d="M15 18 9 12l6-6"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"/>
    </symbol>
    <symbol id="icon-users" viewBox="0 0 24 24">
      <path d="M9 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm8 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.5 20a5.5 5.5 0 0 1 11 0v1h-11zm11.5 1a4.5 4.5 0 0 1 9 0z"/>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
      <path d="M5 4.5A2.5 2.5 0 0 1 7.5 2H20v17H7.5A2.5 2.5 0 0 0 5 21.5Zm0 0V20m3-13h8m-8 4h8m-8 4h5"/>
    </symbol>
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="m12 3 2.7 5.48 6.05.88-4.38 4.27 1.03 6.03L12 16.82 6.6 19.66l1.03-6.03L3.25 9.36l6.05-.88Z"/>
    </symbol>
    <symbol id="icon-chart" viewBox="0 0 24 24">
      <path d="M4 19h16M7 15V9m5 6V5m5 10v-3"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="m5 13 4 4L19 7"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="m6 6 12 12M18 6 6 18"/>
    </symbol>
  </svg>

  <main class="student-page">
    <header class="student-topbar">
      <a class="back-link" href="../html/oquvchi.html">
        <svg><use href="#icon-arrow-left"></use></svg>
        <span>Back to students</span>
      </a>

      <button
        class="theme-toggle"
        id="theme-toggle"
        type="button"
        aria-label="Switch to dark mode"
        aria-pressed="false"
        title="Dark mode"
      >
        <svg><use href="#icon-moon"></use></svg>
      </button>
    </header>

    <section class="student-hero card" id="student-hero">
      <div class="student-hero-copy">
        <p class="eyebrow" id="student-level">Student level</p>
        <h1 id="student-name">Student name</h1>
        <p id="student-status">Student status</p>
        <div class="meta-pills" id="student-meta"></div>
      </div>

      <div class="student-hero-stats" id="student-hero-stats"></div>
    </section>

    <section class="student-layout">
      <div class="student-main">
        <section class="card section-card">
          <div class="section-heading">
            <div>
              <h2>Lesson task holati</h2>
              <p>Faqat muammoli topshiriqlar ko'rsatiladi: bajarmagan, chala yoki xato bajarilganlar.</p>
            </div>
          </div>
          <div class="task-grid" id="task-grid"></div>
        </section>

        <section class="card section-card">
          <div class="section-heading">
            <div>
              <h2>Lesson insights</h2>
              <p>Teacher yaratgan topshiriqlar bo'yicha umumiy natija.</p>
            </div>
          </div>
          <div class="insight-grid" id="insight-grid"></div>
        </section>
      </div>

      <aside class="student-side">
        <section class="card section-card">
          <div class="section-heading compact">
            <div>
              <h3>Student summary</h3>
              <p>Asosiy profil ma'lumotlari</p>
            </div>
          </div>
          <div class="summary-list" id="student-summary"></div>
        </section>
      </aside>
    </section>
  </main>

  <script type="module" src="../js/student_rank.js"></script>
</body>
</html>
