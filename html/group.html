<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johns Group Detail</title>
  <link rel="stylesheet" href="../css/group.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24">
      <path d="M15 18 9 12l6-6"/>
    </symbol>
    <symbol id="icon-users" viewBox="0 0 24 24">
      <path d="M9 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm8 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.5 20a5.5 5.5 0 0 1 11 0v1h-11zm11.5 1a4.5 4.5 0 0 1 9 0z"/>
    </symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24">
      <path d="M7 2v3m10-3v3M4 8h16M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2"/>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
      <path d="M5 4.5A2.5 2.5 0 0 1 7.5 2H20v17H7.5A2.5 2.5 0 0 0 5 21.5Zm0 0V20m3-13h8m-8 4h8m-8 4h5"/>
    </symbol>
    <symbol id="icon-wallet" viewBox="0 0 24 24">
      <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5H19v14H6.5A2.5 2.5 0 0 1 4 16.5Zm0 0h13m-1 4h4v4h-4a2 2 0 0 1 0-4Z"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"/>
    </symbol>
  </svg>

  <main class="group-page">
    <header class="group-topbar">
      <a class="back-link" href="../html/index.html">
        <svg><use href="#icon-arrow-left"></use></svg>
        <span>Back to dashboard</span>
      </a>

      <button
        class="theme-toggle"
        id="theme-toggle"
        type="button"
        aria-label="Switch to dark mode"
        aria-pressed="false"
        title="Dark mode"
      >
        <svg><use href="#icon-moon"></use></svg>
      </button>
    </header>

    <section class="group-hero card">
      <div class="group-hero-copy">
        <p class="eyebrow" id="group-level">Group level</p>
        <h1 id="group-title">Group title</h1>
        <p id="group-description">Group description</p>

        <div class="meta-pills">
          <span id="group-teacher">Teacher</span>
          <span id="group-room">Room</span>
          <span id="group-next-lesson">Next lesson</span>
        </div>
      </div>

      <div class="group-hero-stats" id="group-stats"></div>
    </section>

    <section class="group-layout">
      <div class="group-main">
        <section class="card section-card">
          <div class="section-heading">
            <h2>Students</h2>
          </div>
          <div class="student-list" id="group-students"></div>
        </section>
      </div>

      <aside class="group-side">
        <section class="card section-card">
          <div class="section-heading compact">
            <div>
              <h3>Group summary</h3>
              <p>Current class information</p>
            </div>
          </div>
          <div class="summary-list" id="group-summary"></div>
        </section>
      </aside>
    </section>
  </main>

  <script type="module" src="../js/group.js"></script>
</body>
</html>
