<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dualigo Groups</title>
  <link rel="stylesheet" href="../css/dualigo.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-home" viewBox="0 0 24 24">
      <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-5h-5v5H5a1 1 0 0 1-1-1z"/>
    </symbol>
    <symbol id="icon-users" viewBox="0 0 24 24">
      <path d="M9 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm8 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.5 20a5.5 5.5 0 0 1 11 0v1h-11zm11.5 1a4.5 4.5 0 0 1 9 0z"/>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
      <path d="M5 4.5A2.5 2.5 0 0 1 7.5 2H20v17H7.5A2.5 2.5 0 0 0 5 21.5Zm0 0V20m3-13h8m-8 4h8m-8 4h5"/>
    </symbol>
    <symbol id="icon-user" viewBox="0 0 24 24">
      <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 9a7 7 0 1 1 14 0z"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
      <path d="M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14Zm9 3-4.35-4.35"/>
    </symbol>
    <symbol id="icon-menu" viewBox="0 0 24 24">
      <path d="M4 7h16M4 12h16M4 17h16"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"/>
    </symbol>
  </svg>

  <div class="page-shell">
    <main class="dashboard card">
      <aside class="sidebar" aria-label="Sidebar navigation">
        <div class="sidebar-top">
          <span class="brand-icon" aria-hidden="true">
            <svg><use href="#icon-menu"></use></svg>
          </span>
        </div>

        <nav class="sidebar-nav" aria-label="Main navigation">
          <ul id="nav-list"></ul>
        </nav>
      </aside>

      <section class="page-main">
        <header class="page-topbar">
          <div>
            <p class="eyebrow">Dualigo</p>
            <h1>Groups</h1>
            <p class="page-description">Dualigo uchun biriktiriladigan guruhlar ro'yxati.</p>
          </div>

          <button
            class="theme-toggle"
            id="theme-toggle"
            type="button"
            aria-label="Switch to dark mode"
            aria-pressed="false"
            title="Dark mode"
          >
            <svg><use href="#icon-moon"></use></svg>
          </button>
        </header>

        <label class="searchbar" aria-label="Search groups">
          <svg><use href="#icon-search"></use></svg>
          <input id="dualigo-search" type="search" placeholder="Guruh qidirish...">
        </label>

        <section class="groups-panel">
          <div class="section-heading">
            <div>
              <h2>Available groups</h2>
              <p>Hozircha boshlanishiga barcha mavjud guruhlar shu yerda turadi.</p>
            </div>
            <span class="group-count" id="group-count">0 groups</span>
          </div>

          <div class="dualigo-group-list" id="dualigo-group-list"></div>
        </section>
      </section>
    </main>
  </div>

  <script type="module" src="../js/dualigo.js"></script>
</body>
</html>
