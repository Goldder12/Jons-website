<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johns Admin Login</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-brand">
        <img src="../img/photo_2023-03-10_05-57-29.jpg" alt="John's logo">
        <div>
          <p class="eyebrow">Johns English Center</p>
          <h1>Admin Login</h1>
          <p class="subtitle">Dashboardga kirish uchun admin login va parolni kiriting.</p>
        </div>
      </div>

      <form class="login-form" id="login-form">
        <label>
          <span>Login</span>
          <input id="username" name="username" type="text" placeholder="Admin login" autocomplete="username" required>
        </label>

        <label>
          <span>Password</span>
          <input id="password" name="password" type="password" placeholder="Admin password" autocomplete="current-password" required>
        </label>

        <p class="login-error" id="login-error" aria-live="polite"></p>

        <button type="submit">Kirish</button>
      </form>
    </section>
  </main>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
